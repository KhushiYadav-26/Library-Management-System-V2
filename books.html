<!DOCTYPE html>
<html>
<head>
  <title>Books</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!--  Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .search-wrapper {
      margin: 20px;
      display: flex;
      justify-content: flex-start;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      animation: fadeInUp 0.4s ease;
      gap: 10px;
      overflow-x:auto;
    }

    .search-box {
      position: relative;
      width: 320px;
      margin-left: 30px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 40px 12px 40px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.3s;
    }

    .search-box input:focus {
      border-color: var(--primary, #4f46e5);
      box-shadow: 0 0 10px rgba(79,70,229,0.3);
      outline: none;
    }

    
    .search-box i {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted, #999);
      font-size: 16px;
    }

    .search-box .bi-search {
      left: 12px;
    }

    
    .search-box .bi-x-circle {
      right: 12px;
      cursor: pointer;
      display: none;
    }

    .search-box input:not(:placeholder-shown) ~ .bi-x-circle {
      display: block;
    }

    .search-wrapper button {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      background-color: var(--primary, #4f46e5);
      color: white;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
      white-space: nowrap;
      width: auto;
    }

    .search-wrapper button:hover {
      background-color: #3b38b8;
    }

    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      display: none;
      z-index: 9999;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h2><i class="fa-solid fa-book"></i> Library</h2>
  <a href="index.html">Dashboard</a>
  <a href="add.html">Add Book</a>
  <a href="books.html">View Books</a>
</div>

<div class="main">
  <div class="topbar">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    <h2>Books</h2>
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp; 
    &nbsp; &nbsp;
    <h2></h2>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- SEARCH BAR -->
  <div class="search-wrapper">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input 
        type="text" 
        id="search" 
        placeholder="Search books..." 
        onkeyup="searchBooks()"   
      >
      <i class="bi bi-x-circle" onclick="clearSearch()"></i>
    </div>
    <button onclick="searchBooks()">Search</button>
    <button onclick="loadBooks()">Reset</button>
  </div>

  <!-- TABLE -->
  <table border="1" width="100%" id="bookTable">
    <tr>
      <th>ID</th>
      <th>Image</th>
      <th>Title</th>
      <th>Author</th>
      <th>Actions</th>
    </tr>
  </table>
</div>

<script>
const API = "/api/books";

//TOAST FUNCTION 
function showToast(message, type="success") {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.style.backgroundColor = type === "success" ? "#4CAF50" : "#f44336";
  toast.style.display = "block";
  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.transition = "opacity 0.5s";
    toast.style.opacity = "0";
    setTimeout(() => toast.style.display = "none", 500);
  }, 2500);
}

//LOAD ALL BOOKS 
function loadBooks() {
  fetch(API)
    .then(res => res.json())
    .then(data => renderTable(data))
    .catch(err => console.error("Failed to load books:", err));
}

//RENDER TABLE 
function renderTable(data) {
  const table = document.getElementById("bookTable");
  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Image</th>
      <th>Title</th>
      <th>Author</th>
      <th>Actions</th>
    </tr>
  `;

  if (!data || data.length === 0) {
    table.innerHTML += `<tr><td colspan="5" style="text-align:center">No books found!</td></tr>`;
    return;
  }

  data.forEach(book => {
    table.innerHTML += `
      <tr>
        <td>${book.id}</td>
        <td><img src="${book.image}" width="60" alt="${book.title}"></td>
        <td>${book.title}</td>
        <td>${book.author}</td>
        <td>
          <button onclick="editBook(${book.id})">Update</button>
          <button onclick="deleteBook(${book.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

//SEARCH 
function searchBooks() {
  const query = document.getElementById("search").value.trim();
  if (!query) return loadBooks();

  fetch(`/api/books/search?q=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => renderTable(data))
    .catch(err => {
      console.error("Search failed:", err);
      showToast("Search failed!", "error");
    });
}

//CLEAR SEARCH 
function clearSearch() {
  document.getElementById("search").value = "";
  loadBooks();
}

//EDIT / DELETE 
function editBook(id) {
  window.location.href = `add.html?id=${id}`;
}

function deleteBook(id) {
  fetch(`${API}/${id}`, { method: "DELETE" })
    .then(res => res.json())
    .then(() => {
      showToast("Book Deleted Successfully!", "success");
      loadBooks();
    })
    .catch(err => {
      console.error("Delete failed:", err);
      showToast("Delete failed!", "error");
    });
}

//SIDEBAR 
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}

//INITIAL LOAD 
loadBooks();
</script>

</body>
</html>
