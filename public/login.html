<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Library</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    width: 360px;
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
    font-weight: 600;
  }

  .roles {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .role-box {
    flex: 1;
    padding: 12px;
    margin: 0 5px;
    border: 2px solid #ccc;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
  }

  .role-box.selected {
    border-color: #4f46e5;
    background-color: #4f46e5;
    color: white;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  input:focus {
    border-color: #4f46e5;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    color: white;
    display: none;
    z-index: 9999;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">
  
  <h2>Login</h2>
  

  <div class="roles">
    <div class="role-box selected" data-role="student">Student</div>
    <div class="role-box" data-role="admin">Admin</div>
  </div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <a href="register.html" class="link">New User? Register</a>
</div>
<div id="toast"></div>



<script>
  let selectedRole = "student";

  document.querySelectorAll(".role-box").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".role-box").forEach(x => x.classList.remove("selected"));
      b.classList.add("selected");
      selectedRole = b.dataset.role;
    });
  });

  function toast(msg, color="#4CAF50") {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.background = color;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
  }

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      toast("Fill all fields", "#f44336");
      return;
    }

    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      toast(data.message || "Login failed", "#f44336");
      return;
    }

    if (data.user.role !== selectedRole) {
      toast("Wrong role selected", "#f44336");
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    toast("Login success");

    setTimeout(() => {
      window.location.href = "/index.html";
    }, 800);
  });
</script>

</body>
</html>
