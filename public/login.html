<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Library</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    width: 360px;
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
    font-weight: 600;
  }

  .roles {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .role-box {
    flex: 1;
    padding: 12px;
    margin: 0 5px;
    border: 2px solid #ccc;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
  }

  .role-box.selected {
    border-color: #4f46e5;
    background-color: #4f46e5;
    color: white;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  input:focus {
    border-color: #4f46e5;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #4f46e5;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #3b38b8;
  }

  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    color: white;
    display: none;
    z-index: 9999;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <!-- UI role only (NOT used for security) -->
  <div class="roles">
    <div class="role-box selected" data-role="student">Student</div>
    <div class="role-box" data-role="admin">Admin</div>
  </div>

  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>

  <button id="loginBtn">Login</button>
  <a href="register.html" class="link">New User? Register</a>
</div>

<div id="toast"></div>

<script>
  // UI role (optional only)
  let selectedRole = "student";

  document.querySelectorAll('.role-box').forEach(box => {
    box.addEventListener('click', () => {
      document.querySelectorAll('.role-box').forEach(b => b.classList.remove('selected'));
      box.classList.add('selected');
      selectedRole = box.dataset.role;
    });
  });

  function showToast(msg, color="#4CAF50") {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.background = color;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 2000);
  }

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      showToast("Fill all fields", "#f44336");
      return;
    }

    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok || !data.user) {
        showToast(data.message || "Login failed", "#f44336");
        return;
      }

      showToast("Login success");

      // ✅ REAL ROLE BASED REDIRECT (IMPORTANT FIX)
      setTimeout(() => {
        if (data.user.role === "admin") {
          window.location.href = "/add.html";
        } else {
          window.location.href = "/index.html";
        }
      }, 800);

    } catch (err) {
      console.error(err);
      showToast("Server error", "#f44336");
    }
  });
</script>

</body>
</html>
