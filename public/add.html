<!DOCTYPE html>
<html>
<head>
  <title>Add Book</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .topbar {
      display: flex;
      align-items: center;
      gap: 15px;
    }
   
   
    
  </style>

  <script src="js/auth.js"></script>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h2><i class="fa-solid fa-book"></i> Library</h2>
  <a href="index.html">Dashboard</a>
  <a href="add.html">Add Book</a>
  <a href="books.html">View Books</a>
  <a href="admin-reports.html">Report</a>
</div>

<div class="main">

  <div class="topbar">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    <h2>Add Book</h2>
  </div>

  <div class="form-container">
    <form id="bookForm" enctype="multipart/form-data">
      <h2 id="formTitle">Add Book</h2>

      <div id="toast"></div>

      <input type="text" id="title" placeholder="Title" required>
      <input type="text" id="author" placeholder="Author" required>
      <textarea id="description" placeholder="Description"></textarea>

      <label>Upload Image</label>
      <input type="file" id="image" name="image">

      <div style="text-align:center; margin:10px 0; color:#999;">— OR —</div>

      <label>Image URL</label>
      <input type="text" id="imageUrl" placeholder="Paste Image URL">

      <button type="submit" id="submitBtn">Add Book</button>
    </form>
  </div>
</div>

<script>
protectPage(["admin"]);

const API = "/api/books";

const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

let isEdit = false;

if (bookId) {
  isEdit = true;
  document.getElementById("formTitle").innerText = "Update Book";
  document.getElementById("submitBtn").innerText = "Update Book";

  fetch(`/api/books/${bookId}`, {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  })
    .then(res => res.json())
    .then(data => {
      document.getElementById("title").value = data.title || "";
      document.getElementById("author").value = data.author || "";
      document.getElementById("description").value = data.description || "";
      document.getElementById("imageUrl").value = data.image || "";
    });
}

document.getElementById("bookForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const token = localStorage.getItem("token");

  const title = document.getElementById("title").value;
  const author = document.getElementById("author").value;
  const description = document.getElementById("description").value;
  const imageUrl = document.getElementById("imageUrl").value;
  const imageFile = document.getElementById("image").files[0];

  const formData = new FormData();
  formData.append("title", title);
  formData.append("author", author);
  formData.append("description", description);
  formData.append("imageUrl", imageUrl);
  if (imageFile) formData.append("image", imageFile);

  const url = isEdit ? `/api/books/${bookId}` : API;
  const method = isEdit ? "PUT" : "POST";

  const res = await fetch(url, {
    method,
    headers: {
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  const data = await res.json();

  if (res.ok) {
    alert(isEdit ? "Book Updated Successfully!" : "Book Added Successfully!");
    if (!isEdit) document.getElementById("bookForm").reset();
    setTimeout(() => {
  window.location.href = "books.html";
}, 300);

  } else {
    alert(data.message || "Error");
  }
});

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}

protectPage(["admin"]);
</script>

</body>
</html>
